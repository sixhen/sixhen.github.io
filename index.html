<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sixhen</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:url('bg.jpg') center/cover no-repeat;
}

body::before{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
backdrop-filter:blur(6px);
}

.card{
position:relative;
z-index:2;
width:360px;
max-width:90%;
padding:32px;
border-radius:28px;
text-align:center;

background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.15);
backdrop-filter:blur(20px);

box-shadow:
0 0 30px rgba(255,255,255,.08),
0 0 60px rgba(0,0,0,.4);
}

.avatar{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid rgba(255,255,255,.8);
box-shadow:0 0 25px rgba(255,255,255,.35);
}

h1{
color:white;
margin-top:15px;
font-size:34px;
}

.bio{
color:#ddd;
margin-top:8px;
font-size:14px;
}

.line{
width:80px;
height:3px;
background:white;
margin:18px auto;
border-radius:999px;
}

.btn{
display:block;
text-decoration:none;
color:white;
margin-top:12px;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,.1);
border:1px solid rgba(255,255,255,.12);
transition:.25s;
}

.btn:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.2);
}

.footer{
margin-top:18px;
font-size:12px;
color:#bbb;
}

.particle{
position:absolute;
background:white;
border-radius:50%;
opacity:.7;
animation:fly linear infinite;
}

@keyframes fly{
from{
transform:translateY(110vh);
}
to{
transform:translateY(-120px);
}
}
</style>
</head>
<body>

<div id="particles"></div>

<div class="card">
<img src="avatar.jpg" class="avatar">

<h1>sixhen</h1>

<div class="line"></div>

<div class="bio">
Welcome To My Portfolio
</div>

<a href="#" class="btn">📘 Facebook</a>
<a href="#" class="btn">🎮 Discord</a>
<a href="#" class="btn">🎵 TikTok</a>
<a href="#" class="btn">💻 GitHub</a>

<div class="footer">
© sixhen
</div>
</div>

<audio autoplay loop controls style="display:none">
<source src="bg.mp3" type="audio/mpeg">
</audio>

<script>
const box=document.getElementById("particles");

for(let i=0;i<80;i++){
const p=document.createElement("div");
p.className="particle";

const s=Math.random()*4+1;

p.style.width=s+"px";
p.style.height=s+"px";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(Math.random()*12+8)+"s";

box.appendChild(p);
}
</script>

</body>
</html>
